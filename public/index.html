<!DOCTYPE html>
<html lang="en">
  <head>
    <title>My shop</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* Dark Background */
      body,
      html {
        background-color: #121212 !important;
        color: white !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* Ensure the root React container takes up the full height */
      #root {
        background-color: #121212 !important;
        width: 100%;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* App container should also use flex */
      .app-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Content should take up the remaining space */
      .content {
        flex: 1;
      }

      /* Footer stays at the bottom */
      .footer-container {
        text-align: center;
        background-color: #1e1e1e;
        color: white;
        padding: 10px;
        font-size: 18px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <noscript></noscript>
    <div id="root">
      <div class="content">
        <!-- React content will be here -->
      </div>
      <footer class="footer-container">Online Store Copyright©</footer>
    </div>
  </body>
</html>
